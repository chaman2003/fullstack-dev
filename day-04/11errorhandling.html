        // Example 2: Handling division by zero
        // In JavaScript, division by zero results in Infinity, not an error
        try{
            // Attempting a division by zero operation
            a=10/0              // This results in Infinity, not an error in JavaScript
            b=a                 // Assigning the result to another variable
            console.log(b)      // Logging the result (will show "Infinity")
        }
        catch(b){
            // This block will only execute if an actual error occurs
