<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    /**
     * JavaScript Loops Examples
     * Demonstrates for, while, and do-while loops
     */
        
    // For loop - executes a block of code a specified number of times
    console.log("For loop")
    for (i = 1; i <= 5; i++) {
        console.log("For loop:", i);
    }

    // While loop - executes a block of code as long as the condition is true
    console.log("while")
    let j = 1;
    while (j <= 5) {
        console.log("loop", j);
        j++
    }

    // Do-while loop - executes a block of code once, then repeats as long as the condition is true
    console.log("do while")
    k = 1
    do {
        console.log("Loop", k)
        k++
    }
    while (k <= 5)

    </script>
</body>
</html>
