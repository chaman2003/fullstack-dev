<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional stmts</title>
</head>
<body>
    
<script>
/**
 * JavaScript Conditional Statements Examples
 * Demonstrates if-else statements and switch cases
 */

// If-else conditional statement example
let x = 15;
let y = 10;

if (x > y) {
    console.log("x is big "); // This will execute when x > y
} else if (x < y) {
    console.log("x is small "); // This will execute when x < y
} else {
    console.log("x = y"); // This will execute when x equals y
}
    
// Switch statement example
let thuppa = "ide";
switch(thuppa){
    case "ide":  
        console.log("Kodi");
        break; // Breaks out of the switch statement
    case "illa": 
        console.log("Nimdy angadi na illa pattanagere shed aa ?");
        break;
    case "gothilla": 
        console.log("Ninu manushyane alla");
        break;
    default: 
        console.log("Enri media") // Executes if none of the cases match
}

</script>

</body>
</html>
